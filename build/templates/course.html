<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="course-id" content="{{id}}">
  <title>{{title}} · UTIC Training</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
</head>
<body>

  <nav class="navbar navbar-expand bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">UTIC Training</a>
      <span class="navbar-text d-inline-flex align-items-center gap-2 user-header" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span class="user-name"></span>
      </span>
    </div>
  </nav>

  <main class="container my-4">
    <a href="../index.html" class="d-inline-flex align-items-center gap-1 mb-3 text-secondary text-decoration-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      All courses
    </a>

    <div class="mb-2">
      <h1 class="h2 mb-1">{{title}}</h1>
      <p class="text-secondary">{{description}}</p>
    </div>

    {{categories}}

    <article class="mb-4">
      {{content}}
    </article>

    {{documents}}

    <div class="course-actions d-flex justify-content-center my-4" hidden>
      <button class="btn-complete btn btn-primary" type="button">Mark as completed</button>
    </div>
  </main>

  <footer class="container py-4">
    <small class="text-secondary">UTIC Training · Generated on {{date}}</small>
  </footer>

  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/access.js"></script>
  <script src="../assets/js/completion.js"></script>
</body>
</html>
