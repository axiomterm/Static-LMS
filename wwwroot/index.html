<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Courses · UTIC Training</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
</head>
<body>

  <nav class="navbar navbar-expand bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">UTIC Training</a>
      <span class="navbar-text d-inline-flex align-items-center gap-2 user-header" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span class="user-name"></span>
      </span>
    </div>
  </nav>

  <main class="container my-4">
    <h1 class="h2 mb-4">Course Catalog</h1>

    <div class="card mb-4">
        <div class="card-body d-flex flex-wrap align-items-center gap-3">
          <div class="d-flex align-items-center gap-2">
            <label class="form-label mb-0 text-secondary">Category:</label>
            <div class="dropdown category-filter">
              <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" data-base="Filter by category">Filter by category</button>
              <ul class="dropdown-menu p-2">
                <li><label class="dropdown-item"><input class="form-check-input me-2" type="checkbox" value="onboarding"> Onboarding</label></li>
                <li><label class="dropdown-item"><input class="form-check-input me-2" type="checkbox" value="training"> Training</label></li>
              </ul>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <label class="form-label mb-0 text-secondary">Courses:</label>
            <select class="form-select form-select-sm w-auto course-filter">
              <option value="all">All</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="d-flex align-items-center gap-2 ms-auto">
            <label class="form-label mb-0 text-secondary">Sort:</label>
            <select class="form-select form-select-sm w-auto course-sort">
              <option value="date">Date (newest first)</option>
              <option value="alphabetical">Alphabetical (A-Z)</option>
            </select>
          </div>
        </div>
      </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 courses-grid">
      <div class="col course-item" data-categories="onboarding" data-course-id="welcome" data-date="2026-05-20">
        <div class="card h-100">
          <div class="card-header d-flex justify-content-between align-items-start gap-2">
            <h2 class="h5 mb-0">Welcome to internal training</h2>
          </div>
          <div class="card-body d-flex flex-column">
            <p class="card-text text-secondary">How the course portal works and what we expect from you.</p>
            <div class="mt-auto"><span class="badge rounded-pill text-bg-light border">Onboarding</span></div>
          </div>
          <div class="card-footer d-flex justify-content-between align-items-center">
            <small class="text-secondary">Published on 2026-05-20</small>
            <a href="courses/welcome.html" class="btn btn-primary btn-sm">Go to course</a>
          </div>
        </div>
      </div>
    </div>

    <p class="no-results text-secondary mt-3" hidden><em>No courses match the selection.</em></p>
  </main>

  <footer class="container py-4">
    <small class="text-secondary">UTIC Training · 1 course(s) · Generated on 2026-07-01 20:07</small>
  </footer>

  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/completion.js"></script>
</body>
</html>
